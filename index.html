<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClearCity</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<h1>🧹 ClearCity — Waste Reporting</h1>

<div id="dashboard">
  <p>Total: <span id="total">0</span></p>
  <p>In Progress: <span id="progress">0</span></p>
  <p>Cleaned: <span id="cleaned">0</span></p>
</div>

<div id="controls">
  <select id="severity">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
  </select>
  <button id="addBtn">Add Report Mode</button>
</div>

<button id="locBtn">Use My Location</button>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
